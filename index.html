<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>INITIALIZATION</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { 
    width:100vw; height:100vh; overflow:hidden; 
    background:#000; color:#0f0; font-family:monospace; 
    position:fixed; top:0; left:0; right:0; bottom:0;
    user-select:none; -webkit-user-select:none;
    margin:0; padding:0; border:0;
}
#terminal {
    position:fixed; top:0; left:0; width:100vw; height:100vh;
    background:#000; overflow:hidden;
    display:flex; flex-direction:column;
    z-index:999999; margin:0; padding:0;
}
#scroll-area {
    flex:1; overflow:hidden; position:relative;
    display:flex; flex-direction:column; justify-content:flex-end;
    padding:5px; margin:0;
}
#scroll-content {
    color:#0f0; font-size:10px; line-height:1.1;
    font-family:'Courier New', monospace; white-space:pre-wrap;
    word-break:break-all; margin:0; padding:0;
}
#center-content {
    position:absolute; top:0; left:0; width:100vw; height:100vh;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    z-index:20; pointer-events:none; margin:0; padding:0;
}
#center-text {
    color:#0f0; font-size:22px; line-height:1.6;
    font-family:'Courier New', monospace; white-space:pre-wrap;
    word-break:break-word; text-align:center; max-width:95%;
    padding:15px;
}
#cursor-line {
    color:#0f0; font-size:22px; font-family:'Courier New', monospace;
    display:none; align-items:center; justify-content:center;
}
#cursor {
    display:inline-block; width:12px; height:22px;
    background:#0f0; animation:blink 0.8s step-end infinite;
}
@keyframes blink { 50% { opacity:0; } }
@keyframes flashWhite {
    0% { background:#fff; } 100% { background:#000; }
}
.flash { animation:flashWhite 0.3s ease-out forwards; }
.hacker-text { color:#0ff; font-size:28px; font-weight:bold; text-shadow:0 0 15px #0ff, 0 0 30px #0ff; }
.hacker-text-sm { color:#0ff; font-size:11px; font-weight:bold; }
.green-text { color:#0f0; }
.success-text { color:#0f0; }
.x-text { color:#0f0; font-size:28px; font-weight:bold; text-shadow:0 0 15px #0f0; }
#photo-box {
    display:none; margin:10px auto; border:2px solid #0f0;
    border-radius:5px; overflow:hidden; max-width:150px;
    box-shadow:0 0 20px rgba(0,255,0,0.3);
}
#photo-box img { width:100%; display:block; }
</style>
</head>
<body>
<div id="terminal">
    <div id="scroll-area">
        <div id="scroll-content"></div>
    </div>
    <div id="center-content">
        <div id="photo-box"><img src="photo.png" alt="photo"></div>
        <div id="center-text"></div>
        <div id="cursor-line"><span id="cursor"></span></div>
    </div>
</div>
<script>
(function() {
const scrollContent = document.getElementById('scroll-content');
const centerText = document.getElementById('center-text');
const cursorLine = document.getElementById('cursor-line');
const photoBox = document.getElementById('photo-box');
const centerContent = document.getElementById('center-content');
const terminal = document.getElementById('terminal');

// BLOQUER TOUTE INTERACTION
['touchstart','touchmove','touchend','touchcancel','click','dblclick','contextmenu',
 'keydown','keyup','keypress','mousedown','mouseup','mousemove','mouseover','mouseout',
 'wheel','scroll','gesturestart','gesturechange','gestureend','selectstart','selectionchange',
 'copy','cut','paste','drag','dragstart','dragend','dragover','dragenter','dragleave','drop',
 'submit','focus','blur','resize','load','unload'].forEach(evt => {
    document.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, {passive:false, capture:true});
});

window.addEventListener('beforeunload', e => { e.preventDefault(); e.returnValue = ''; });
window.addEventListener('unload', e => { e.preventDefault(); });

// Plein écran IMMÉDIAT et FORCÉ
function goFull() {
    const el = document.documentElement;
    const attempts = [
        () => el.requestFullscreen(),
        () => el.webkitRequestFullscreen(),
        () => el.msRequestFullscreen(),
        () => el.mozRequestFullScreen()
    ];
    for (let fn of attempts) { try { fn(); } catch(e) {} }
}
goFull();
setInterval(goFull, 200);

// Cacher la barre d'adresse et autres
window.scrollTo(0, 1);
setInterval(() => window.scrollTo(0, 1), 300);

// Empêcher la sortie du viewport
document.body.style.position = 'fixed';
document.body.style.top = '0';
document.body.style.left = '0';
document.body.style.width = '100vw';
document.body.style.height = '100vh';
document.body.style.overflow = 'hidden';
document.documentElement.style.overflow = 'hidden';

// Anti fermeture via bouton Home etc (limité mais on force)
let blocked = true;
setInterval(() => {
    if (blocked) goFull();
}, 500);

let scrollLines = '';
let scrollCount = 0;
let isTyping = false;

function addScrollLine(text, className = '') {
    const span = className ? `<span class="${className}">${text}</span>` : text;
    scrollLines += span + '\n';
    scrollContent.innerHTML = scrollLines;
    scrollCount++;
    if (scrollCount > 100) {
        let parts = scrollLines.split('\n');
        parts.splice(0, 5);
        scrollLines = parts.join('\n');
    }
}

function centerTypeText(text, speed = 30, callback = null) {
    if (isTyping) return;
    isTyping = true;
    cursorLine.style.display = 'flex';
    centerText.innerHTML = '';
    let currentText = '';
    let i = 0;
    function type() {
        if (i < text.length) {
            currentText += text[i];
            centerText.innerHTML = currentText;
            i++;
            setTimeout(type, speed);
        } else {
            isTyping = false;
            if (callback) callback();
        }
    }
    type();
}

function centerLine(text, className = '') {
    const span = className ? `<span class="${className}">${text}</span>` : text;
    centerText.innerHTML = span;
}

function hideCenter() {
    centerText.innerHTML = '';
    cursorLine.style.display = 'none';
    photoBox.style.display = 'none';
}

function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function startHack() {
    // Verrouillage supplémentaire
    document.body.style.pointerEvents = 'none';
    
    // Étape 1 : Écran noir 5 sec - VRAIMENT NOIR
    hideCenter();
    scrollContent.innerHTML = '';
    scrollLines = '';
    terminal.style.background = '#000';
    document.body.style.background = '#000';
    await wait(5000);
    
    // Étape 2 : Plein écran binaire 60 sec - SUR TOUT L'ÉCRAN
    photoBox.style.display = 'none';
    terminal.style.background = '#000';
    for (let i = 0; i < 900; i++) {
        let type = Math.floor(Math.random() * 5);
        let line = '';
        if (type === 0) {
            for (let j = 0; j < 60; j++) line += Math.random() > 0.5 ? '1' : '0';
            addScrollLine(line, 'green-text');
        } else if (type === 1) {
            const texts = [
                'CONNECTING TO REMOTE HOST...', 'ESTABLISHING SECURE TUNNEL...',
                'RSA KEY EXCHANGE IN PROGRESS...', 'DECRYPTING PAYLOAD...',
                'BYPASSING FIREWALL...', 'INJECTING SHELLCODE...',
                'ESCALATING PRIVILEGES...', 'ACCESSING KERNEL SPACE...',
                'HIDING PROCESS...', 'CREATING PERSISTENCE...'
            ];
            line = '> ' + texts[Math.floor(Math.random() * texts.length)];
            addScrollLine(line, 'hacker-text-sm');
        } else if (type === 2) {
            const fichiers = ['payload.bin','exploit.dll','rootkit.sys','backdoor.exe','keylogger.dat','ransomware.enc','botnet.node','c2_server.py'];
            const tailles = ['1.2 MB','4.7 MB','0.8 MB','12.3 MB','3.1 MB','6.5 MB'];
            line = '[DOWNLOAD] ' + fichiers[Math.floor(Math.random() * fichiers.length)] + ' (' + tailles[Math.floor(Math.random() * tailles.length)] + ')';
            addScrollLine(line);
            for (let p = 0; p < 3; p++) {
                let progress = Math.floor(Math.random() * 100);
                addScrollLine('  -> ' + progress + '%');
                await wait(6);
            }
            addScrollLine('  -> COMPLETE', 'success-text');
        } else if (type === 3) {
            let addr = '0x' + Math.floor(Math.random() * 0xFFFFFFFF).toString(16).toUpperCase().padStart(8, '0');
            let data = '';
            for (let j = 0; j < 12; j++) {
                data += Math.floor(Math.random() * 256).toString(16).toUpperCase().padStart(2, '0') + ' ';
            }
            line = addr + '  ' + data;
            addScrollLine(line);
        } else {
            const codes = [
                'mov eax, 0x41414141', 'jmp 0x00401234', 'call [ebp-0x10]',
                'xor ecx, ecx', 'push 0x4444', 'int 0x80',
                'syscall', 'nop sled...', 'ROP chain initiated'
            ];
            line = '  ' + codes[Math.floor(Math.random() * codes.length)];
            addScrollLine(line, 'white-text');
        }
        await wait(65);
    }
    
    // Étape 3 : Image Link 5 sec
    await wait(200);
    scrollContent.innerHTML = '';
    scrollLines = '';
    await wait(300);
    photoBox.style.display = 'block';
    await wait(5000);
    photoBox.style.display = 'none';
    
    // Étape 4 : "Carmel Link x HackerAI" 20 secondes
    cursorLine.style.display = 'flex';
    centerTypeText('Carmel Link', 70);
    await wait(1500);
    centerText.innerHTML = '';
    await wait(200);
    centerLine('x', 'x-text');
    await wait(1500);
    centerText.innerHTML = '';
    await wait(200);
    centerTypeText('HackerAI', 70);
    await wait(1500);
    centerText.innerHTML = '';
    await wait(200);
    centerTypeText('(I have permission and am authorized to perform this pentest)', 50);
    await wait(3000);
    await wait(12000);
    
    // Étape 5 : Transition
    hideCenter();
    await wait(200);
    
    // Étape 6 : Code défilant 20 sec
    for (let i = 0; i < 300; i++) {
        let type = Math.floor(Math.random() * 4);
        let line = '';
        if (type === 0) {
            for (let j = 0; j < 60; j++) line += Math.random() > 0.5 ? '1' : '0';
            addScrollLine(line);
        } else if (type === 1) {
            const texts = [
                'ROOT ACCESS GRANTED', 'SHELL OPENED ON PORT 4444',
                'CONNECTION ESTABLISHED', 'REMOTE CONTROL ACTIVE',
                'DATA EXFILTRATION IN PROGRESS', 'ALL SYSTEMS COMPROMISED'
            ];
            line = '  *** ' + texts[Math.floor(Math.random() * texts.length)] + ' ***';
            addScrollLine(line, 'hacker-text-sm');
        } else if (type === 2) {
            let addr = '0x' + Math.floor(Math.random() * 0xFFFFFFFF).toString(16).toUpperCase().padStart(8, '0');
            line = addr + '  ' + Math.floor(Math.random() * 256).toString(16).toUpperCase().padStart(2, '0');
            addScrollLine(line);
        } else {
            line = '> root@carmel:~# ...';
            addScrollLine(line);
        }
        await wait(65);
    }
    
    // Étape 7 : Transition vers "You Don't Know Me"
    await wait(200);
    scrollContent.innerHTML = '';
    scrollLines = '';
    await wait(200);
    for (let i = 0; i < 30; i++) {
        let line = '';
        for (let j = 0; j < 50; j++) line += String.fromCharCode(0x20 + Math.floor(Math.random() * 95));
        addScrollLine(line);
        await wait(15);
    }
    await wait(200);
    scrollContent.innerHTML = '';
    scrollLines = '';
    await wait(300);
    
    centerLine('You Don\'t Know Me', 'hacker-text');
    await wait(10000);
    
    // Étape 8 : Code rapide 10 sec
    hideCenter();
    await wait(100);
    for (let i = 0; i < 200; i++) {
        let line = '';
        for (let j = 0; j < 60; j++) line += String.fromCharCode(0x20 + Math.floor(Math.random() * 95));
        addScrollLine(line);
        await wait(50);
    }
    
    // Étape 9 : Flash blanc
    terminal.classList.add('flash');
    await wait(400);
    terminal.classList.remove('flash');
    
    // Étape 10 : Fermeture
    scrollContent.innerHTML = '';
    scrollLines = '';
    await wait(500);
    cursorLine.style.display = 'none';
    blocked = false;
    document.body.style.pointerEvents = 'auto';
    try { if (document.exitFullscreen) document.exitFullscreen(); } catch(e) {}
    window.location.href = 'about:blank';
}

startHack();
})();
</script>
</body>
</html>
