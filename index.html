<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INITIALIZATION</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { 
    width:100%; height:100%; overflow:hidden; 
    background:#000; color:#0f0; font-family:monospace; 
    position:fixed; top:0; left:0; user-select:none;
    -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none;
}
#terminal {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:#000; overflow:hidden;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
}
#output {
    color:#0f0; font-size:18px; line-height:1.6;
    font-family:'Courier New', monospace; white-space:pre-wrap;
    word-break:break-word; text-align:center; max-width:95%;
    padding:15px;
}
#cursor-line {
    color:#0f0; font-size:20px; font-family:'Courier New', monospace;
    display:none; align-items:center; justify-content:center;
}
#cursor {
    display:inline-block; width:12px; height:22px;
    background:#0f0; animation:blink 0.8s step-end infinite;
}
@keyframes blink { 50% { opacity:0; } }
@keyframes flashWhite {
    0% { background:#fff; }
    100% { background:#000; }
}
.flash { animation:flashWhite 0.3s ease-out forwards; }
.hacker-text { color:#0ff; font-size:28px; font-weight:bold; text-shadow:0 0 15px #0ff, 0 0 30px #0ff; }
.title-text { color:#0f0; font-size:24px; font-weight:bold; text-shadow:0 0 10px #0f0, 0 0 20px #0f0; }
.success-text { color:#0f0; font-size:18px; }
.binary-line { color:#0f0; font-size:14px; line-height:1.2; font-family:'Courier New', monospace; }
#photo-box {
    display:none; margin:15px auto; border:2px solid #0f0;
    border-radius:5px; overflow:hidden; max-width:180px;
    box-shadow:0 0 30px rgba(0,255,0,0.3);
}
#photo-box img { width:100%; display:block; }
.initial-black {
    background:#000;
}
</style>
</head>
<body>
<div id="terminal" class="initial-black">
    <div id="photo-box"><img src="photo.png" alt="photo"></div>
    <div id="output"></div>
    <div id="cursor-line"><span id="cursor"></span></div>
</div>
<script>
const output = document.getElementById('output');
const cursorLine = document.getElementById('cursor-line');
const photoBox = document.getElementById('photo-box');
const terminal = document.getElementById('terminal');

// Bloque tout
document.addEventListener('touchstart', e => e.preventDefault());
document.addEventListener('touchmove', e => e.preventDefault());
document.addEventListener('touchend', e => e.preventDefault());
document.addEventListener('click', e => e.preventDefault());
document.addEventListener('dblclick', e => e.preventDefault());
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => e.preventDefault());
document.addEventListener('keyup', e => e.preventDefault());
window.addEventListener('beforeunload', e => { e.preventDefault(); e.returnValue = ''; });

// Plein écran forcé
function requestFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
}
requestFullscreen();
setInterval(requestFullscreen, 1000);

let currentText = '';
let isTyping = false;

function typeText(text, speed = 30, callback = null) {
    if (isTyping) return;
    isTyping = true;
    cursorLine.style.display = 'flex';
    output.innerHTML = '';
    currentText = '';
    let i = 0;
    function type() {
        if (i < text.length) {
            currentText += text[i];
            output.innerHTML = currentText;
            i++;
            setTimeout(type, speed);
        } else {
            isTyping = false;
            if (callback) callback();
        }
    }
    type();
}

function addLine(text, className = '') {
    const span = className ? `<span class="${className}">${text}</span>` : text;
    output.innerHTML = span;
}

function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function startHack() {
    // 1. Écran noir immédiat 3 secondes (il clique et plus rien)
    output.innerHTML = '';
    photoBox.style.display = 'none';
    await wait(3000);
    
    // 2. Image Link 5 secondes
    photoBox.style.display = 'block';
    await wait(5000);
    
    // 3. Binaire 0101 sur tout l'écran pendant 28 secondes
    photoBox.style.display = 'none';
    output.style.fontSize = '12px';
    for (let i = 0; i < 430; i++) {
        let line = '';
        for (let j = 0; j < 50; j++) {
            line += Math.random() > 0.5 ? '1' : '0';
        }
        addLine(line, 'binary-line');
        await wait(65);
    }
    
    await wait(300);
    output.innerHTML = '';
    output.style.fontSize = '20px';
    await wait(400);
    
    // 4. "Carmel Link + HackerAI" lettre par lettre
    cursorLine.style.display = 'flex';
    typeText('Carmel Link', 70);
    await wait(1500);
    
    output.innerHTML = '';
    await wait(200);
    
    typeText('+', 70);
    await wait(800);
    
    output.innerHTML = '';
    await wait(200);
    
    typeText('HackerAI', 70);
    await wait(1500);
    
    output.innerHTML = '';
    await wait(200);
    
    typeText('sont surprenants', 60);
    await wait(2000);
    
    output.innerHTML = '';
    await wait(500);
    
    // 5. You Don't Know Me - figé 8 secondes
    addLine('You Don\'t Know Me', 'hacker-text');
    cursorLine.style.display = 'none';
    await wait(8000);
    
    // 6. Code ultra rapide (5 secondes)
    output.innerHTML = '';
    await wait(100);
    output.style.fontSize = '11px';
    for (let i = 0; i < 200; i++) {
        let line = '';
        for (let j = 0; j < 60; j++) {
            line += String.fromCharCode(0x20 + Math.floor(Math.random() * 95));
        }
        output.innerHTML = line;
        await wait(25);
    }
    
    // 7. Flash blanc
    terminal.classList.add('flash');
    await wait(400);
    terminal.classList.remove('flash');
    
    // 8. Retour à la normale
    output.innerHTML = '';
    output.style.fontSize = '20px';
    await wait(200);
    
    cursorLine.style.display = 'none';
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    else if (document.msExitFullscreen) document.msExitFullscreen();
}

startHack();
</script>
</body>
</html>
